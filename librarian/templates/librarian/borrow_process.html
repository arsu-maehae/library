{% extends 'librarian/base.html' %}

{% block content %}
<h2>🎒 Borrow Process</h2>

{% if error %}
<div class="alert alert-danger alert-dismissible fade show" role="alert">
    <strong>Error!</strong> {{ error }}
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>
{% endif %}
{% if success %}
<div class="alert alert-success alert-dismissible fade show" role="alert">
    <strong>Success!</strong> {{ success }}
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>
{% endif %}

<div class="card mb-4 mt-3">
    <div class="card-header bg-light">
        <strong>Manual Borrow Entry</strong>
    </div>
    <div class="card-body">
        <form method="post" class="row g-3">
            {% csrf_token %}
            <div class="col-md-4">
                <label class="form-label">Member SSID</label>
                <input type="text" name="ssid" class="form-control" required placeholder="Enter SSID">
            </div>
            <div class="col-md-3">
                <label class="form-label">Book ID</label>
                <input type="text" name="book_id" class="form-control" required placeholder="Enter Book ID">
            </div>
            <div class="col-md-3">
                <label class="form-label">Duration</label>
                <div class="input-group">
                    <input type="number" name="duration" class="form-control" value="7" min="1">
                    <select name="unit" class="form-select">
                        <option value="days" selected>Days</option>
                        <option value="months">Months</option>
                        <option value="years">Years</option>
                    </select>
                </div>
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button type="submit" class="btn btn-success w-100">Confirm</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
