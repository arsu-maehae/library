{% extends 'librarian/base.html' %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div style="width: 100%; max-width: 420px;">

        <!-- Logo / Brand Header -->
        <div class="text-center mb-4">
            <div style="width:56px;height:56px;background:var(--brown);border-radius:14px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:22px;">
                ✦
            </div>
            <h1 style="font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;color:var(--ink);margin:0;">
                Library Admin
            </h1>
            <p style="color:var(--ink-soft);font-size:0.875rem;margin:4px 0 0;">
                Sign in to manage the collection
            </p>
        </div>

        <!-- Login Card -->
        <div style="background:var(--cream-card);border:1px solid var(--border);border-radius:16px;box-shadow:0 4px 24px var(--shadow);padding:32px;">

            {% if form.errors %}
            <div class="alert alert-danger mb-4">
                <strong>Login failed.</strong> Please check your credentials and try again.
            </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}

                <div class="mb-4">
                    <label class="form-label">Username</label>
                    <input type="text" name="username"
                           class="form-control"
                           required autofocus
                           value="{{ request.POST.username|default:'' }}"
                           placeholder="Enter your username"
                           style="height:46px;">
                </div>

                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <input type="password" name="password"
                           class="form-control"
                           required
                           placeholder="Enter your password"
                           style="height:46px;">
                </div>

                <button type="submit" class="btn btn-brown w-100" style="height:46px;font-size:0.95rem;letter-spacing:0.3px;">
                    Continue →
                </button>
            </form>
        </div>

    </div>
</div>
{% endblock %}
