{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
      body{font-family:Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial;background:#f6f9ff;padding:40px}
      .card{max-width:720px;margin:40px auto;border-radius:12px;box-shadow:0 10px 30px rgba(39,54,66,0.06)}
      .card-body{padding:28px}
      .meta{color:#6b7280}
    </style>
  </head>
  <body>
    <div class="card">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div>
            <h4 class="mb-0">Student Profile</h4>
            <div class="meta">Welcome to the library portal</div>
          </div>
          <div>
            <a href="{% url 'member:logout' %}" class="btn btn-outline-secondary">Logout</a>
          </div>
        </div>

        <hr>

        <div class="row">
          <div class="col-md-6">
            <h6 class="text-muted">Student ID</h6>
            <p class="fs-5">{{ student_id|default:'(not set)' }}</p>
          </div>
          <div class="col-md-6">
            <h6 class="text-muted">Next steps</h6>
            <ul>
              <li>Search the catalog</li>
              <li>Borrow books</li>
              <li>View borrowing history</li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
